# ===============================
# BASIC APPLICATION SETTINGS
# ===============================
spring.application.name=Ayurkisan-Ecommerce
server.port=9090

# ===============================
# MONGODB ATLAS
# ===============================
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.repositories.type=auto

# Performance & Pooling Config
# (Using settings inside MONGO_URI from .env)

# ===============================
# LOGGING (SILENT TERMINAL)
# ===============================
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.mongodb=ERROR
logging.level.com.mongodb=ERROR
logging.level.com.ayurkisan=INFO

# Hide banner and startup info
spring.main.banner-mode=off
spring.main.log-startup-info=false
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# Timeouts to prevent hanging on Render
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ENABLE DEBUG LOGS
spring.mail.properties.mail.debug=true
