# ===============================
# BASIC APPLICATION SETTINGS
# ===============================
spring.application.name=Ayurkisan-Ecommerce
server.port=9090

# ===============================
# MONGODB ATLAS
# ===============================
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.repositories.type=auto

# Performance & Pooling Config
# (Using settings inside MONGO_URI from .env)

# ===============================
# LOGGING (SILENT TERMINAL)
# ===============================
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.mongodb=ERROR
logging.level.com.mongodb=ERROR
logging.level.com.ayurkisan=INFO

# Hide banner and startup info
spring.main.banner-mode=off
spring.main.log-startup-info=false
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
